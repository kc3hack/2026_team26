name: Backend CI

on:
  push:
    branches: ["**"]
    paths:
      - "backend/**"

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.x"

      - name: Run backend tests
        run: |
          cd backend
          go test ./...

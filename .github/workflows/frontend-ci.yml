name: Frontend CI

on:
  push:
    branches: ["**"]
    paths:
      - "frontend/**"

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install and build
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run build

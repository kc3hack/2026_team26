version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: team26_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-team26}
      POSTGRES_USER: ${DB_USER:-team26}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-team26}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-team26}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local

networks:
  default:
    name: team26_network

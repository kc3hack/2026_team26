version: "3.8"

services:
  db:
    build: ./docker/postgres
    container_name: kc3-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-team26}
      POSTGRES_USER: ${DB_USER:-team26}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-team26}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
      - ./docker/postgres/server.crt:/tmp/server.crt:ro
      - ./docker/postgres/server.key:/tmp/server.key:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-team26}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: kc3-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-team26}
      DB_USER: ${DB_USER:-team26}
      DB_PASSWORD: ${DB_PASSWORD:-team26}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: kc3-frontend
    restart: unless-stopped
    ports:
      - "3000:4173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}

volumes:
  pgdata:
    driver: local

networks:
  default:
    name: team26_network

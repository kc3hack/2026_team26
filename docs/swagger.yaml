openapi: 3.0.3
info:
  title: Team26 Backend API
  version: 0.1.0
  description: API based on sequence.mmd and er.mmd
servers:
  - url: http://localhost:8080
tags:
  - name: Auth
    description: Authentication
  - name: Fatigue
    description: 疲労度関係
  - name: Updates
    description: アップデートの確認
  - name: Team
    description: チーム情報・チーム全体の疲労度など
security:
  - bearerAuth: []
paths:
  /auth/signup:
    post:
      summary: Sign up
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "200":
          description: Signup success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/signin:
    post:
      summary: Sign in
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SigninRequest"
      responses:
        "200":
          description: Signin success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/refresh:
    post:
      summary: Refresh access token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
  /auth/logout:
    post:
      summary: Logout (revoke refresh token)
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "204":
          description: Logged out
  /fatigue:
    post:
      summary: Create fatigue log
      tags:
        - Fatigue
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FatigueCreateRequest"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FatigueCreateResponse"
    get:
      summary: Get fatigue logs
      tags:
        - Fatigue
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserFatigueQuery"
        - $ref: "#/components/parameters/FromTimestampQuery"
        - $ref: "#/components/parameters/ToTimestampQuery"
        - $ref: "#/components/parameters/MaxNumberQuery"
      responses:
        "200":
          description: Fatigue logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FatigueListResponse"
  /ws/fatigue:
    get:
      summary: Fatigue updates WebSocket
      tags:
        - Fatigue
      description: WebSocket endpoint emitting fatigue updates after POST /fatigue
      security:
        - bearerAuth: []
      responses:
        "101":
          description: Switching Protocols
      x-websocket: true
  /team/create:
    post:
      summary: Create team
      tags:
        - Team
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamCreateRequest"
      responses:
        "200":
          description: Created team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamCreateResponse"
  /team/join:
    post:
      summary: Join team
      tags:
        - Team
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamJoinRequest"
      responses:
        "200":
          description: Joined team
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamJoinResponse"
  /team/leave:
    post:
      summary: Leave team
      tags:
        - Team
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TeamLeaveRequest"
      responses:
        "204":
          description: Left team
  /team/fatigue:
    get:
      summary: Get team fatigue logs
      tags:
        - Team
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TeamFatigueQuery"
        - $ref: "#/components/parameters/FromTimestampQuery"
        - $ref: "#/components/parameters/ToTimestampQuery"
        - $ref: "#/components/parameters/MaxNumberQuery"
      responses:
        "200":
          description: Fatigue logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamFatigueResponse"
  /update:
    get:
      summary: check newest version
      tags:
        - updates
      description: アップデートの確認用
      responses:
        "200":
          description: 正常時
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateResponse"
components:
  schemas:
    SignupRequest:
      type: object
      required:
        - email
        - password
        - display_name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        display_name:
          type: string
    SigninRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    AuthResponse:
      type: object
      required:
        - user
        - access_token
      properties:
        user:
          $ref: "#/components/schemas/User"
        access_token:
          type: string
        refresh_token:
          type: string
    User:
      type: object
      required:
        - id
        - email
        - display_name
        - created_at
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        created_at:
          type: string
          format: date-time
    FatigueCreateRequest:
      type: object
      required:
        - user_id
        - face_score
        - voice_score
      properties:
        user_id:
          type: string
          format: uuid
        game_id:
          type: string
          format: uuid
        face_score:
          type: integer
          minimum: 0
        voice_score:
          type: integer
          minimum: 0
        recorded_at:
          type: string
          format: date-time
    FatigueCreateResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
    FatigueListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FatigueLog"
    FatigueLog:
      type: object
      required:
        - id
        - user_id
        - game_id
        - face_score
        - voice_score
        - recorded_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        game_id:
          type: string
          format: uuid
        face_score:
          type: integer
          minimum: 0
        voice_score:
          type: integer
          minimum: 0
        recorded_at:
          type: string
          format: date-time
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    RefreshResponse:
      type: object
      required:
        - access_token
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
    LogoutRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
    UpdateResponse:
      type: object
      properties:
        current:
          type: string
          format: version
          description: 現在の最終バージョン
        support:
          type: array
          description: サポートしているバージョンのリスト
          items:
            type: string
            format: version
    TeamData:
      type: object
      required:
        - id
        - name
        - created_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: チーム名
        created_at:
          type: string
          format: date-time
        created_by:
          type: string
          format: uuid
          description: チーム作成者のユーザID
    TeamCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: チーム名
    TeamCreateResponse:
      $ref: "#/components/schemas/TeamData"
    TeamJoinRequest:
      type: object
      required:
        - team_tag
      properties:
        team_tag:
          type: string
          description: チーム参加用のタグ
    TeamJoinResponse:
      $ref: "#/components/schemas/TeamData"
    TeamLeaveRequest:
      type: object
      required:
        - team_id
      properties:
        team_id:
          type: string
          format: uuid
          description: 退出するチームのID
    TeamFatigueResponse:
      type: object
      required:
        - team_data
        - team_user
        - fatigue_logs
      properties:
        team_data:
          $ref: "#/components/schemas/TeamData"
        team_user:
          type: array
          items:
            $ref: "#/components/schemas/User"
        fatigue_logs:
          type: object
          description: User ID (UUID) をキーとした疲労度ログの配列
          additionalProperties:
            type: array
            items:
              $ref: "#/components/schemas/FatigueLog"

    ErrorResponse:
      type: object
      required:
        - errorMessage
      properties:
        errorMessage:
          type: string
          description: エラーメッセージ
  parameters:
    UserFatigueQuery:
      name: u
      in: query
      required: true
      description: User UUID
      schema:
        type: string
        format: uuid
    FromTimestampQuery:
      name: f
      in: query
      required: false
      description: From timestamp (inclusive)
      schema:
        type: string
        format: date-time
    ToTimestampQuery:
      name: t
      in: query
      required: false
      description: To timestamp (inclusive)
      schema:
        type: string
        format: date-time
    MaxNumberQuery:
      name: n
      in: query
      required: false
      description: Max Number of responses
      schema:
        type: integer
        minimum: 1
    TeamFatigueQuery:
      name: team_id
      in: query
      required: true
      description: チーム全体の疲労度を取得するチームのID
      schema:
        type: string
        format: uuid
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
